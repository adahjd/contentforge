<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ContentForge{% endblock %} — AI内容创作平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2.5 text-xl font-bold">
                    <span class="w-8 h-8 rounded-lg gradient-bg flex items-center justify-center text-white text-sm">C</span>
                    <span class="gradient-text">ContentForge</span>
                </a>
                <div class="flex items-center gap-6">
                    <a href="/pricing" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">定价</a>
                    {% if user %}
                    <a href="/dashboard" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">工作台</a>
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-500">{{ user.username }}</span>
                        <span class="text-xs px-2 py-0.5 rounded-full {% if user.plan == 'pro' %}bg-blue-100 text-blue-700{% elif user.plan == 'business' %}bg-purple-100 text-purple-700{% else %}bg-gray-100 text-gray-600{% endif %}">
                            {{ plans[user.plan].name }}
                        </span>
                        <a href="/logout" class="text-sm text-gray-400 hover:text-red-500 transition-colors">退出</a>
                    </div>
                    {% else %}
                    <a href="/login" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">登录</a>
                    <a href="/register" class="text-sm font-medium px-4 py-2 rounded-lg gradient-bg text-white hover:opacity-90 transition-opacity">免费注册</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-400">
            <p>&copy; 2024 ContentForge. AI驱动的内容创作平台.</p>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
