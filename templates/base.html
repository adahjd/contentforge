<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ContentForge{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/" class="font-bold text-lg text-blue-600">ContentForge</a>
            <div class="flex items-center gap-4 text-sm">
                {% if user %}
                    <span class="text-gray-500">{{ user.username }}</span>
                    <a href="/dashboard" class="text-gray-600 hover:text-gray-900">工作台</a>
                    <a href="/logout" class="text-gray-400 hover:text-red-500">退出</a>
                {% else %}
                    <a href="/login" class="text-gray-600 hover:text-gray-900">登录</a>
                    <a href="/register" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm hover:bg-blue-700">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
