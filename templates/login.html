{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
    <h2 class="text-2xl font-bold text-center mb-6">登录</h2>
    <form action="/api/login" method="POST" class="space-y-4">
        <input type="email" name="email" required placeholder="邮箱"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
        <input type="password" name="password" required placeholder="密码"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
        <button type="submit" class="w-full py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700">
            登录
        </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
        还没有账户？<a href="/register" class="text-blue-600 hover:underline">注册</a>
    </p>
</div>
{% endblock %}
