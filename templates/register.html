{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-center mb-2">免费注册</h2>
            <p class="text-gray-500 text-center mb-8">开始你的AI创作之旅</p>
            <form action="/api/auth/register" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors" placeholder="你的昵称">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">邮箱</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors" placeholder="至少6位">
                </div>
                <button type="submit" class="w-full py-3 rounded-xl gradient-bg text-white font-semibold hover:opacity-90 transition-opacity">
                    免费注册
                </button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-6">
                已有账户？<a href="/login" class="text-blue-600 font-medium hover:underline">登录</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
