{% extends "base.html" %}
{% block title %}{{ tool.name }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <a href="/dashboard" class="text-sm text-gray-400 hover:text-gray-600 mb-4 inline-block">← 返回工作台</a>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-{{ tool.color }}-50 to-white px-6 py-5 border-b border-gray-100 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-{{ tool.color }}-500 flex items-center justify-center text-white">
                <i class="fa-solid fa-{{ tool.icon }} text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold">{{ tool.name }}</h1>
                <p class="text-sm text-gray-500">{{ tool.desc }}</p>
            </div>
        </div>

        <form id="generateForm" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">广告目标/产品 <span class="text-red-400">*</span></label>
                <input type="text" name="topic" id="topic" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors"
                    placeholder="你要推广什么？">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">卖点/优势</label>
                <textarea name="prompt" id="prompt" rows="2"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors resize-none"
                    placeholder="列出核心卖点、优惠信息等..."></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">平台</label>
                    <select name="platform" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
                        <option value="general">通用</option>
                        <option value="douyin">抖音/短视频</option>
                        <option value="wechat">微信/朋友圈</option>
                        <option value="search">搜索引擎</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">风格</label>
                    <select name="style" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
                        <option value="persuasive" selected>有说服力</option>
                        <option value="creative">创意吸睛</option>
                        <option value="professional">专业可信</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">长度</label>
                    <select name="length" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
                        <option value="short" selected>简短有力</option>
                        <option value="medium">中等</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center justify-between pt-2">
                <div class="text-sm text-gray-400">
                    剩余积分: <span id="creditsDisplay" class="font-semibold text-blue-600">{{ user.credits }}</span>
                </div>
                <button type="submit" id="submitBtn"
                    class="px-8 py-3 rounded-xl gradient-bg text-white font-semibold hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>开始生成
                </button>
            </div>
        </form>

        <div id="resultSection" class="hidden border-t border-gray-100">
            <div class="flex items-center justify-between px-6 py-3 bg-gray-50 border-b border-gray-100">
                <span class="text-sm font-medium text-gray-600">生成结果</span>
                <div class="flex items-center gap-3">
                    <button id="copyBtn" onclick="copyResult()" class="text-sm text-gray-400 hover:text-blue-600 transition-colors">
                        <i class="fa-solid fa-copy mr-1"></i>复制
                    </button>
                    <button onclick="document.getElementById('generateForm').dispatchEvent(new Event('submit'))" class="text-sm text-gray-400 hover:text-blue-600 transition-colors">
                        <i class="fa-solid fa-rotate-right mr-1"></i>重新生成
                    </button>
                </div>
            </div>
            <div id="resultContent" class="p-6 prose prose-sm max-w-none text-gray-700 leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('generateForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const resultSection = document.getElementById('resultSection');
    const resultContent = document.getElementById('resultContent');

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>生成中...';
    resultSection.classList.add('hidden');

    const formData = new FormData(this);
    formData.set('tool_type', '{{ tool.id }}');

    try {
        const resp = await fetch('/api/generate', { method: 'POST', body: formData });
        const data = await resp.json();
        if (data.success) {
            resultContent.textContent = data.result;
            resultSection.classList.remove('hidden');
            document.getElementById('creditsDisplay').textContent = data.credits_left;
            resultSection.scrollIntoView({behavior: 'smooth'});
        } else {
            alert(data.error || '生成失败');
        }
    } catch(err) {
        alert('网络错误，请重试');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>开始生成';
    }
});

async function copyResult() {
    const text = document.getElementById('resultContent').textContent;
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>已复制';
    setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-copy mr-1"></i>复制'; }, 2000);
}
</script>
{% endblock %}
